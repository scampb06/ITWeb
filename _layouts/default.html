<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #24292e;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
    }

    /* ── Site header ───────────────────────────────────────────────────────── */
    .site-header {
      background: #1b3a6b;
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .site-header a {
      color: #a8c8ff;
      text-decoration: none;
      font-size: 0.9em;
    }
    .site-header a:hover { text-decoration: underline; }
    .site-header .site-title {
      color: #fff;
      font-weight: 600;
      font-size: 1em;
    }

    /* ── Main content ──────────────────────────────────────────────────────── */
    .main-content {
      background: #fff;
      max-width: 98%;
      margin: 20px auto;
      padding: 28px 36px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    /* ── Typography ────────────────────────────────────────────────────────── */
    h1 { font-size: 1.6em; color: #1b3a6b; border-bottom: 2px solid #d0d7de; padding-bottom: 8px; }
    h2 { font-size: 1.3em; color: #1b3a6b; margin-top: 28px; }
    h3 { font-size: 1.1em; color: #2a4a7f; }
    a { color: #0366d6; }
    a:hover { text-decoration: underline; }
    p { margin: 0 0 12px; }
    ul, ol { padding-left: 24px; }
    li { margin-bottom: 4px; }
    hr { border: none; border-top: 1px solid #e1e4e8; margin: 24px 0; }
    blockquote {
      border-left: 4px solid #2a4a7f;
      margin: 0 0 12px;
      padding: 4px 16px;
      color: #555;
    }
    code {
      background: #f3f4f6;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 0.88em;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    /* ── Tables ────────────────────────────────────────────────────────────── */
    /* Block + overflow-x makes wide tables scroll rather than break layout.   */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.88em;
      line-height: 1.45;
      table-layout: auto;
    }
    thead th {
      background: #1b3a6b;
      color: #fff;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      border: 1px solid #15306b;
      vertical-align: top;
    }
    tbody td {
      padding: 8px 14px;
      border: 1px solid #d0d7de;
      vertical-align: top;
    }
    tbody tr:nth-child(even) { background: #f6f8fa; }
    tbody tr:hover { background: #eaf1fb; }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .main-content { padding: 16px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="{{ '/' | relative_url }}">🏠 Home</a>
    <span class="site-title">{{ site.title }}</span>
  </header>
  <main class="main-content">
    {{ content }}
  </main>
</body>
</html>
