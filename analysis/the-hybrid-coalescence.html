<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hybrid Coalescence — ITWeb Security Summit 2026</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --accent: #e63946;
            --accent2: #f4a261;
            --accent3: #457b9d;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.10);
        }

        html, body {
            background: var(--bg);
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'DM Sans', system-ui, sans-serif;
            color: var(--text);
        }

        /* ── Deck ── */
        .deck {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ── Slides ── */
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            opacity: 0;
            transform: scale(0.97);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }
        .slide.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        /* ── Slide image ── */
        .slide img {
            max-width: 100%;
            max-height: calc(100vh - 80px);
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 8px 48px rgba(0,0,0,0.6);
            display: block;
        }

        /* ── Nav controls ── */
        .nav-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
        }
        .nav-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: var(--accent);
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.16); }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }

        .slide-dots {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            max-width: 280px;
            justify-content: center;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: background 0.25s, transform 0.25s;
        }
        .dot.active {
            background: var(--accent);
            transform: scale(1.4);
        }
        .slide-counter {
            font-size: 0.75rem;
            color: var(--muted);
            min-width: 44px;
            text-align: center;
        }

        /* ── Top bar ── */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: rgba(10,15,30,0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            z-index: 100;
        }
        .top-bar a {
            color: var(--accent3);
            text-decoration: none;
            font-size: 0.78rem;
        }
        .top-bar a:hover { text-decoration: underline; }
        .top-bar .title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }
        .top-bar .badge {
            font-size: 0.7rem;
            color: var(--muted);
            background: rgba(255,255,255,0.06);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        /* ── Fullscreen button ── */
        .fs-btn {
            position: fixed;
            top: 10px;
            right: 16px;
            z-index: 101;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.72rem;
            cursor: pointer;
            font-family: inherit;
        }
        .fs-btn:hover { color: var(--text); }

        /* ── Keyboard hint ── */
        .kb-hint {
            position: fixed;
            bottom: 70px;
            right: 16px;
            font-size: 0.65rem;
            color: rgba(148,163,184,0.5);
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="../index.md">← Home</a>
    <span class="title">The Hybrid Coalescence</span>
    <span class="badge">ITWeb Security Summit 2026</span>
</div>

<button class="fs-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

<div class="deck" id="deck">
    <div class="slide active" data-slide="1"><img src="coalescence_slides/slide_01.png" alt="Slide 1"></div>
    <div class="slide" data-slide="2"><img src="coalescence_slides/slide_02.png" alt="Slide 2"></div>
    <div class="slide" data-slide="3"><img src="coalescence_slides/slide_03.png" alt="Slide 3"></div>
    <div class="slide" data-slide="4"><img src="coalescence_slides/slide_04.png" alt="Slide 4"></div>
    <div class="slide" data-slide="5"><img src="coalescence_slides/slide_05.png" alt="Slide 5"></div>
    <div class="slide" data-slide="6"><img src="coalescence_slides/slide_06.png" alt="Slide 6"></div>
    <div class="slide" data-slide="7"><img src="coalescence_slides/slide_07.png" alt="Slide 7"></div>
    <div class="slide" data-slide="8"><img src="coalescence_slides/slide_08.png" alt="Slide 8"></div>
    <div class="slide" data-slide="9"><img src="coalescence_slides/slide_09.png" alt="Slide 9"></div>
    <div class="slide" data-slide="10"><img src="coalescence_slides/slide_10.png" alt="Slide 10"></div>
    <div class="slide" data-slide="11"><img src="coalescence_slides/slide_11.png" alt="Slide 11"></div>
    <div class="slide" data-slide="12"><img src="coalescence_slides/slide_12.png" alt="Slide 12"></div>
    <div class="slide" data-slide="13"><img src="coalescence_slides/slide_13.png" alt="Slide 13"></div>
    <div class="slide" data-slide="14"><img src="coalescence_slides/slide_14.png" alt="Slide 14"></div>
    <div class="slide" data-slide="15"><img src="coalescence_slides/slide_15.png" alt="Slide 15"></div>
</div>

<div class="nav-controls">
    <button class="nav-btn" id="btn-prev" onclick="move(-1)">&#8592;</button>
    <div class="slide-dots" id="dots"></div>
    <span class="slide-counter" id="counter">1 / 15</span>
    <button class="nav-btn" id="btn-next" onclick="move(1)">&#8594;</button>
</div>

<div class="kb-hint">← → or click dots to navigate</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const dotsEl = document.getElementById('dots');
    const counter = document.getElementById('counter');
    const total = slides.length;
    let current = 0;

    // Build dots
    slides.forEach((_, i) => {
        const d = document.createElement('span');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        d.addEventListener('click', () => goTo(i));
        dotsEl.appendChild(d);
    });

    function goTo(n) {
        slides[current].classList.remove('active');
        dotsEl.children[current].classList.remove('active');
        current = Math.max(0, Math.min(n, total - 1));
        slides[current].classList.add('active');
        dotsEl.children[current].classList.add('active');
        counter.textContent = `${current + 1} / ${total}`;
        document.getElementById('btn-prev').disabled = current === 0;
        document.getElementById('btn-next').disabled = current === total - 1;
    }

    function move(dir) { goTo(current + dir); }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); move(1); }
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')                    { e.preventDefault(); move(-1); }
    });

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    goTo(0);
</script>
</body>
</html>
